name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  build-python:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Package docs bundle
        run: zip -r docs-bundle.zip docs LICENSE README.md

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            docs-bundle.zip

  build-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          & "$env:GITHUB_WORKSPACE/installer/windows/build-windows.ps1" -Version $version

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*_windows-set-up.exe

  create-release:
    needs: [build-python, build-windows-installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' -o -name '*.zip' -o -name '*_windows-set-up.exe' \) -exec cp -t release-files {} +
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-python.outputs.tag }}
          name: v${{ needs.build-python.outputs.version }} (build ${{ github.run_number }})
          body: |
            ## API Monitor v${{ needs.build-python.outputs.version }}

            ### Windows 一键安装（推荐）

            下载 **`${{ needs.build-python.outputs.version }}_windows-set-up.exe`**：
            - 安装时可**自选安装目录**
            - 可选 **创建桌面快捷方式**
            - 可选 **固定到开始菜单**
            - 关闭程序窗口后**自动停止服务并释放后台进程**
            - 卸载时**自动清理**残留进程

            安装完成后，从开始菜单或桌面打开 **API Monitor**，将自动打开仪表板：http://127.0.0.1:8080/dashboard

            请将 LLM 客户端 API 地址设为：`http://127.0.0.1:8080/v1`，并配置环境变量 `SENTINEL_UPSTREAM_URL` 为您的中转站地址。

            ### 其他下载

            | 文件 | 说明 |
            |------|------|
            | `{version}_windows-set-up.exe` | Windows 安装包 |
            | `api_monitor-*.whl` | Python wheel（开发者） |
            | `api_monitor-*.tar.gz` | 源码包 |
            | `docs-bundle.zip` | 文档 |

            > Windows 安装包体积较大（含离线分析模型依赖），首次构建可能需要数分钟。
          files: release-files/*
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
